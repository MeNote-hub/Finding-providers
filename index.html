<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDIS Provider Directory Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { font-size: 1.5rem; color: #818cf8; display: flex; align-items: center; gap: 10px; }
        .upload-box {
            background: var(--card);
            border: 1px dashed #64748b;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .upload-box input { display: none; }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        input, select {
            background: #0b0f19;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .stats b { color: var(--text); }
        .table-container {
            overflow-x: auto;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th {
            background: #162032;
            padding: 14px 16px;
            font-weight: 600;
            color: #cbd5e1;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #263346;
            vertical-align: top;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        tr:hover { background: rgba(255, 255, 255, 0.02); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-active { background: #065f46; color: #34d399; }
        .badge-inactive { background: #7f1d1d; color: #f87171; }
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover:not(:disabled) { background: var(--primary); border-color: var(--primary); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #818cf8;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏥 NDIS Provider Directory</h1>
        <label class="upload-box" id="dropLabel">
            📁 Select <b>result.csv</b> (Auto-loads if in the same directory)
            <input type="file" id="fileInput" accept=".csv">
        </label>
    </header>

    <div class="controls">
        <div class="control-group">
            <label for="searchInput">🔍 Search (Name, Phone, Email, Profession)</label>
            <input type="text" id="searchInput" placeholder="Type keyword to search...">
        </div>
        <div class="control-group">
            <label for="stateFilter">📍 State / Territory</label>
            <select id="stateFilter">
                <option value="">All States</option>
            </select>
        </div>
        <div class="control-group">
            <label for="statusFilter">🟢 Status</label>
            <select id="statusFilter">
                <option value="">All Statuses</option>
                <option value="1">Active</option>
                <option value="0">Inactive / Unspecified</option>
            </select>
        </div>
        <div class="control-group">
            <label for="pageSize">📄 Results per page</label>
            <select id="pageSize">
                <option value="50">50 Rows</option>
                <option value="100">100 Rows</option>
                <option value="200">200 Rows</option>
            </select>
        </div>
    </div>

    <div id="loading">⏳ Loading and processing data... Please wait</div>

    <div class="stats" id="statsBar" style="display: none;">
        <div>Showing: <b id="showingCount">0</b> of <b id="totalCount">0</b> providers</div>
        <div id="pageInfo">Page 1 / 1</div>
    </div>

    <div class="table-container" id="tableWrapper" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th>Status</th>
                    <th>Provider Name (Prov_N)</th>
                    <th>State</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Website</th>
                    <th>Profession / Service (prfsn)</th>
                    <th>Address</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="pagination" id="pagination" style="display: none;">
        <button class="btn" id="prevBtn" disabled>◀ Previous</button>
        <button class="btn" id="nextBtn" disabled>Next ▶</button>
    </div>
</div>

<script>
    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    let pageSize = 50;

    const fileInput = document.getElementById('fileInput');
    const searchInput = document.getElementById('searchInput');
    const stateFilter = document.getElementById('stateFilter');
    const statusFilter = document.getElementById('statusFilter');
    const pageSizeSelect = document.getElementById('pageSize');
    const tableBody = document.getElementById('tableBody');
    const loading = document.getElementById('loading');
    const tableWrapper = document.getElementById('tableWrapper');
    const statsBar = document.getElementById('statsBar');
    const pagination = document.getElementById('pagination');

    window.addEventListener('DOMContentLoaded', () => {
        loadAutoCSV();
    });

    function loadAutoCSV() {
        loading.style.display = 'block';
        Papa.parse('result.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                initData(results.data);
            },
            error: function() {
                loading.style.display = 'none';
                document.getElementById('dropLabel').style.borderColor = '#f87171';
                document.getElementById('dropLabel').innerHTML = '⚠️ Auto-load failed for <b>result.csv</b>. Click here to select manually.';
            }
        });
    }

    fileInput.addEventListener('change', (e) => {
        if (!e.target.files.length) return;
        loading.style.display = 'block';
        tableWrapper.style.display = 'none';
        
        Papa.parse(e.target.files[0], {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                initData(results.data);
            }
        });
    });

    function initData(data) {
        allData = data;
        loading.style.display = 'none';
        tableWrapper.style.display = 'block';
        statsBar.style.display = 'flex';
        pagination.style.display = 'flex';

        const states = [...new Set(allData.map(d => (d.State_cd || '').trim()).filter(Boolean))].sort();
        stateFilter.innerHTML = '<option value="">All States</option>';
        states.forEach(state => {
            const opt = document.createElement('option');
            opt.value = state;
            opt.textContent = state;
            stateFilter.appendChild(opt);
        });

        applyFilters();
    }

    function applyFilters() {
        const query = searchInput.value.toLowerCase().trim();
        const state = stateFilter.value;
        const status = statusFilter.value;

        filteredData = allData.filter(row => {
            if (status !== '' && row.Active !== status) return false;
            if (state !== '' && (row.State_cd || '').trim() !== state) return false;
            if (query !== '') {
                const searchString = `${row.Prov_N || ''} ${row.Phone || ''} ${row.Email || ''} ${row.prfsn || ''} ${row.Post_cd || ''}`.toLowerCase();
                if (!searchString.includes(query)) return false;
            }
            return true;
        });

        currentPage = 1;
        renderTable();
    }

    function renderTable() {
        tableBody.innerHTML = '';
        pageSize = parseInt(pageSizeSelect.value);
        
        const total = filteredData.length;
        const totalPages = Math.ceil(total / pageSize) || 1;
        
        const start = (currentPage - 1) * pageSize;
        const end = Math.min(start + pageSize, total);
        const pageData = filteredData.slice(start, end);

        document.getElementById('totalCount').textContent = total.toLocaleString();
        document.getElementById('showingCount').textContent = total === 0 ? '0' : `${start + 1} - ${end}`;
        document.getElementById('pageInfo').textContent = `Page ${currentPage} / ${totalPages}`;

        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;

        if (total === 0) {
            tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px; color:#94a3b8;">❌ No matching providers found.</td></tr>';
            return;
        }

        const fragment = document.createDocumentFragment();
        pageData.forEach(row => {
            const tr = document.createElement('tr');
            
            const isActive = row.Active === '1';
            const statusBadge = `<span class="badge ${isActive ? 'badge-active' : 'badge-inactive'}">${isActive ? 'Active' : 'Inactive'}</span>`;

            tr.innerHTML = `
                <td>${statusBadge}</td>
                <td style="font-weight:600; color:#e2e8f0;" title="${row.Prov_N || ''}">${row.Prov_N || '-'}</td>
                <td><b style="color:#818cf8;">${row.State_cd || '-'}</b> (${row.Post_cd || ''})</td>
                <td>${row.Phone || '-'}</td>
                <td><a href="mailto:${row.Email}" style="color:#38bdf8; text-decoration:none;">${row.Email || '-'}</a></td>
                <td>${row.Website ? `<a href="${row.Website.startsWith('http') ? row.Website : 'http://'+row.Website}" target="_blank" style="color:#34d399;">Visit Website ↗</a>` : '-'}</td>
                <td title="${row.prfsn || ''}">${row.prfsn || '-'}</td>
                <td title="${row.Address || ''}">${row.Address || '-'}</td>
            `;
            fragment.appendChild(tr);
        });
        tableBody.appendChild(fragment);
    }

    let searchTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(applyFilters, 300);
    });
    stateFilter.addEventListener('change', applyFilters);
    statusFilter.addEventListener('change', applyFilters);
    pageSizeSelect.addEventListener('change', () => {
        currentPage = 1;
        renderTable();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        const totalPages = Math.ceil(filteredData.length / pageSize);
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
</script>
</body>
</html>
